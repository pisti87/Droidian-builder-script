name: Droidian Kernel Build - Xiaomi Lisa

on:
  push:
    branches: [ "droidian", "main" ]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    env:
      DEVICE: lisa
      VENDOR: xiaomi
      PACKAGES_DIR: ${{ github.workspace }}/packages
      KERNEL_DIR: ${{ github.workspace }}/kernel

    steps:

    # =========================
    # 1. Checkout kernel source
    # =========================
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        path: kernel

    # =========================
    # 2. Prepare workspace
    # =========================
    - name: Setup directories
      run: |
        mkdir -p $PACKAGES_DIR

    # =========================
    # 3. Run Droidian build container
    # =========================
    - name: Build kernel in Droidian container
      run: |
        docker run --rm \
          -v $GITHUB_WORKSPACE/kernel:/buildd/sources \
          -v $PACKAGES_DIR:/buildd \
          quay.io/droidian/build-essential:trixie-amd64 bash -c "

        set -e

        cd /buildd/sources

        echo '=== Installing packaging tools ==='
        apt-get update
        apt-get install -y linux-packaging-snippets git build-essential bc bison flex clang

        echo '=== Preparing packaging skeleton ==='
        mkdir -p debian/source

        cp /usr/share/linux-packaging-snippets/kernel-info.mk.example debian/kernel-info.mk

        echo '3.0 (native)' > debian/source/format
        echo 13 > debian/compat

        cat > debian/rules <<'EOF'
#!/usr/bin/make -f

include /usr/share/linux-packaging-snippets/kernel-snippet.mk

%:
	dh $@
EOF


        chmod +x debian/rules

        echo '=== Configuring kernel-info.mk ==='
        cat >> debian/kernel-info.mk <<EOF

KERNEL_ARCH := arm64
DEB_BUILD_FOR := arm64

KERNEL_DEFCONFIG := lisa_defconfig
KERNEL_BASE_VERSION := 5.4.0

BUILD_CC := clang

KERNEL_CMDLINE := console=tty0 droidian.lvm.prefer

KERNEL_BOOTIMAGE_PAGE_SIZE := 4096
KERNEL_BOOTIMAGE_BASE_OFFSET := 0x40000000
KERNEL_BOOTIMAGE_KERNEL_OFFSET := 0x00008000
KERNEL_BOOTIMAGE_INITRAMFS_OFFSET := 0x01000000
KERNEL_BOOTIMAGE_TAGS_OFFSET := 0x00000100
KERNEL_BOOTIMAGE_VERSION := 2

FLASH_ENABLED := 1
FLASH_INFO_CPU := Qualcomm Technologies, Inc SM7350
FLASH_INFO_MANUFACTURER := Xiaomi
FLASH_INFO_MODEL := lisa

EOF

        echo '=== Generating control file ==='
        dh debian/control || true

        echo '=== Starting build ==='
        export RELENG_HOST_ARCH=arm64
        releng-build-package

        "

    # =========================
    # 4. Upload artifacts
    # =========================
    - name: Upload kernel packages
      uses: actions/upload-artifact@v4
      with:
        name: droidian-kernel-lisa
        path: packages/*.deb
